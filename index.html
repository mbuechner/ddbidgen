<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <meta content="" name="description">
    <meta content="Michael Büchner" name="author">
    <title>DDB ID generator</title>
    <link href="https://getbootstrap.com/docs/5.0/examples/jumbotron/" rel="canonical">
    <!-- Bootstrap core CSS -->
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" rel="stylesheet">
    <!-- Favicons -->
    <link href="images/favicon.ico" rel="icon">
    <meta content="#7952b3" name="theme-color">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js" defer></script>
    <script src="js/sha1.js" defer></script>
    <script src="js/enc-base32.js" defer></script>
    <script>
            //<![CDATA[
            function ddbId() {
          var provIdInput = document.getElementById('provIdInput');
          var provItemIdInput = document.getElementById('provItemIdInput');
          var pid = provIdInput.value ? provIdInput.value : provIdInput.placeholder;
          var piid = provItemIdInput.value ? provItemIdInput.value : provItemIdInput.placeholder;
                var sha1 = CryptoJS.SHA1(pid + piid);
                var base32 = sha1.toString(CryptoJS.enc.Base32);
          var ddbId = base32.toString();
          var sha1Value = sha1.toString();
          document.getElementById('provider-id').textContent = pid.toString();
          document.getElementById('provider-item-id').textContent = piid.toString();
          document.getElementById('ddbIdInput').value = ddbId;
          document.getElementById('sha1a').textContent = sha1Value;
          document.getElementById('sha1b').textContent = sha1Value;
          var base32Container = document.getElementById('base32');
          if (pid === "www_fiz-karlsruhe_de") {
            base32Container.innerHTML = '<a href="https://www.deutsche-digitale-bibliothek.de/organization/' + ddbId + '" target="_blank" rel="noopener noreferrer">' + ddbId + '</a>';
                } else {
            base32Container.innerHTML = '<a href="https://www.deutsche-digitale-bibliothek.de/item/' + ddbId + '" target="_blank" rel="noopener noreferrer">' + ddbId + '</a>';
                }
            }
        document.addEventListener('DOMContentLoaded', function () {
          var provIdInput = document.getElementById('provIdInput');
          var provItemIdInput = document.getElementById('provItemIdInput');
          var ddbIdInput = document.getElementById('ddbIdInput');
          var massInput = document.getElementById('massinput');
          var massOutput = document.getElementById('massoutput');

          document.getElementById('bspBtn01').addEventListener('click', function () {
            provIdInput.value = "00012008";
            provItemIdInput.value = "1000071596";
                    ddbId();
                });

          massInput.addEventListener('scroll', function () {
            massOutput.scrollTop = massInput.scrollTop;
                });

          massOutput.addEventListener('scroll', function () {
            massInput.scrollTop = massOutput.scrollTop;
                });

          document.getElementById('bspBtn02').addEventListener('click', function () {
            provIdInput.value = "www_fiz-karlsruhe_de";
            provItemIdInput.value = "99900374";
                    ddbId();
                });

          document.getElementById('calcBtn').addEventListener('click', function () {
            massOutput.value = "";
            var lines = massInput.value.split('\n');
                    for (var i = 0; i < lines.length; i++) {
                        var sha1 = CryptoJS.SHA1(lines[i].replace('\t', ''));
                        var base32 = sha1.toString(CryptoJS.enc.Base32);
              massOutput.value += base32.toString() + "\n";
                    }
            massOutput.scrollTop = massInput.scrollTop;
                });

          provItemIdInput.addEventListener('input', ddbId);
          provIdInput.addEventListener('input', ddbId);

          ddbIdInput.addEventListener('focus', function () {
            ddbIdInput.select();
          });

          var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
          if (window.bootstrap && window.bootstrap.Tooltip) {
            for (var i = 0; i < tooltipTriggerList.length; i++) {
              new bootstrap.Tooltip(tooltipTriggerList[i]);
            }
          }

          ddbId();
        });//]]></script>
  </head>
  <body>
    <main>
      <div class="container py-4">
        <header class="pb-3 mb-4 border-bottom">
          <a class="d-flex align-items-center text-dark text-decoration-none" href=".">
            <img alt="DDBpro logo" src="images/logo-ddbpro-RGB-grey.webp" width="220">
            <!-- <span class="fs-4">Text</span> -->
          </a>
        </header>
        <div class="p-5 mb-4 bg-light border rounded-3">
          <div class="container-fluid py-5">
            <h1 class="display-5 fw-bold">DDB-ID-Generator</h1>
            <p class="col-md-8 fs-4"> 
            <div class="input-group mb-3">
              <span class="input-group-text col col-md-3 mx-auto" id="provIdInputLabel" style="min-width:150px;">provider-id</span>
              <input aria-describedby="provIdInputLabel" class="form-control" id="provIdInput" placeholder="00012008" style="min-width:150px;" type="text">
            </div>
            <div class="input-group mb-3">
              <span class="input-group-text col col-md-3 mx-auto" id="provItemIdInputLabel" style="min-width:150px;">provider-item-id</span>
              <input aria-describedby="provItemIdInputLabel" class="form-control" id="provItemIdInput" placeholder="1000071596" style="min-width:150px;" type="text">
            </div>
            <div class="input-group mb-3">
              <span class="input-group-text col col-md-3 mx-auto" id="ddbIdInputLabel" style="min-width:150px;">DDB-ID</span>
              <input aria-describedby="ddbIdInputLabel" class="form-control" id="ddbIdInput" placeholder="IDEYVAM52SZTJUSL347PX6JUIFR545ZD" style="min-width:150px;" type="text" readonly>
            </div>
            <div aria-label="Example buttons" class="btn-group mb-5" role="group">
              <button class="btn btn-primary" id="bspBtn01" type="button">Beispiel 1</button>
              <button class="btn btn-primary" id="bspBtn02" type="button">Beispiel 2</button>
            </div>
            <div class="text-nowrap overflow-auto">
              <p class="h5 mb-3 text-break">
                <span data-bs-placement="left" data-bs-toggle="tooltip" style="cursor:help;" title="SHA1 ist eine kryptologische Hashfunktion, die der Berechnung eines eindeutigen Prüfwerts für beliebige digitale Daten dient.">SHA1(</span>“<kbd id="provider-id">00012008</kbd><kbd id="provider-item-id">1000071596</kbd>”<strong>)</strong> = [<span class="text-secondary" id="sha1a">40c98a819dd4b334d24bdf3efbf9344163de7723</span>]<sub>16</sub>
              </p>
              <p class="h5 text-break">
                <span data-bs-placement="left" data-bs-toggle="tooltip" style="cursor:help;" title="Base32 ist ein Verfahren zur Kodierung von Binärdaten in eine Zeichenfolge, die nur aus 32 verschiedenen ASCII-Zeichen (Großbuchstaben und Ziffern) besteht.">BASE32(</span>[<span class="text-secondary" id="sha1b">40c98a819dd4b334d24bdf3efbf9344163de7723</span><strong>]<sub>16</sub>)</strong> = <span id="base32"><a href="https://www.deutsche-digitale-bibliothek.de/item/IDEYVAM52SZTJUSL347PX6JUIFR545ZD" target="_blank" rel="noopener noreferrer">IDEYVAM52SZTJUSL347PX6JUIFR545ZD</a></span>
              </p>
            </div>
          </div>
          <hr>
          <div class="accordion accordion-flush" id="accordion">
            <div class="accordion-item">
              <h2 class="accordion-header" id="flush-headingOne">
                <button aria-controls="flush-collapseOne" aria-expanded="false" class="accordion-button collapsed" data-bs-target="#flush-collapseOne" data-bs-toggle="collapse" type="button"> Batch tool </button>
              </h2>
              <div aria-labelledby="flush-headingOne" class="accordion-collapse collapse" data-bs-parent="#accordion" id="flush-collapseOne">
                <div class="accordion-body">
                  <div class="row">
                    <div class="col-md-6">
                      <div class="form-group">
                        <label for="massinput"> provider-id|provider-item-id </label>
                        <textarea class="form-control mb-3" id="massinput" rows="10" style="font-family:monospace;white-space:pre;overflow-wrap:normal;overflow-x:scroll;">000120081000071596
www_fiz-karlsruhe_de99900374</textarea>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="form-group">
                        <label for="massoutput">DDB-ID</label>
                        <textarea class="form-control mb-3" id="massoutput" readonly="readonly" rows="10" style="font-family:monospace;white-space:pre;overflow-wrap:normal;overflow-x:scroll;"></textarea>
                      </div>
                    </div>
                    <div class="col-md-12 mt-3">
                      <button class="btn btn-primary" id="calcBtn" type="button">Berechnen</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <footer class="pt-3 text-muted float-end">
          <i class="bi bi-github"></i>
          <a href="https://github.com/mbuechner/ddbidgen/" target="_blank" rel="noopener noreferrer">GitHub</a>
        </footer>
      </div>
    </main>
  </body>
</html>
